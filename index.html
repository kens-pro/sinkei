<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ドレミ神経衰弱</title>
<meta name="description" content="音を聞いて同じ音を探す、幼児・児童向けの音感育成メモリーゲーム。">
<style>
:root{
  --ink:#263044;
  --muted:#68758a;
  --paper:#fffef8;
  --line:#e7edf4;
  --pink:#ff6b9f;
  --sun:#ffc83d;
  --mint:#26c99a;
  --sky:#42a5ff;
  --violet:#8e70ff;
  --red:#ff5f57;
  --shadow:0 18px 40px rgba(38,48,68,.16);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;color:var(--ink);background:#fff6d9}
body{
  min-height:100svh;
  overflow-x:hidden;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  background:
    radial-gradient(circle at 12% 12%,rgba(255,255,255,.95) 0 10px,transparent 11px),
    radial-gradient(circle at 88% 18%,rgba(255,255,255,.75) 0 15px,transparent 16px),
    radial-gradient(circle at 25% 78%,rgba(255,255,255,.7) 0 12px,transparent 13px),
    linear-gradient(135deg,#ffe071 0%,#ff9ab7 38%,#85defc 72%,#9cf2cd 100%);
  background-size:140px 140px,170px 170px,190px 190px,100% 100%;
}
button{font:inherit;cursor:pointer;border:0}
.app{width:min(720px,100%);margin:0 auto;padding:14px 12px 24px;display:grid;gap:12px}
.top{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,.78);
  border:3px solid rgba(255,255,255,.95);
  border-radius:18px;
  padding:10px 12px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
}
h1{font-size:clamp(25px,8vw,44px);line-height:1.05;margin:0;letter-spacing:0;color:#fff;text-shadow:2px 2px 0 #6131bb,4px 5px 0 rgba(38,48,68,.18)}
.badge{display:grid;place-items:center;width:62px;height:62px;border-radius:18px;background:conic-gradient(from 210deg,var(--sun),var(--pink),var(--violet),var(--sky),var(--mint),var(--sun));color:white;font-size:34px;box-shadow:0 8px 0 rgba(97,49,187,.22)}
.status{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.stat{
  min-height:64px;
  background:var(--paper);
  border:2px solid rgba(255,255,255,.92);
  border-radius:16px;
  display:grid;
  place-items:center;
  padding:7px 4px;
  box-shadow:0 8px 0 rgba(38,48,68,.08);
}
.stat small{font-size:11px;color:var(--muted);font-weight:900}
.stat b{font-size:clamp(18px,5.5vw,28px);line-height:1;color:#5837c8}
.stars{display:flex;gap:4px;justify-content:center;min-height:24px}
.star{filter:grayscale(1);opacity:.36;transform:scale(.9);transition:.25s ease}
.star.on{filter:none;opacity:1;transform:scale(1.08)}
.message{
  min-height:58px;
  background:#fff;
  border:3px solid #fff;
  border-radius:18px;
  padding:11px 12px;
  display:grid;
  place-items:center;
  text-align:center;
  font-weight:950;
  font-size:clamp(16px,4.8vw,22px);

  box-shadow:var(--shadow);
}
.board-wrap{
  position:relative;
  background:rgba(255,255,255,.86);
  border:4px solid rgba(255,255,255,.96);
  border-radius:24px;
  padding:14px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.board-wrap:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,transparent 0 46%,rgba(255,255,255,.42) 46% 48%,transparent 48%),
    repeating-linear-gradient(0deg,transparent 0 23px,rgba(97,49,187,.09) 24px 27px,transparent 28px 46px);
}
.game-board{position:relative;z-index:1;display:grid;gap:10px;justify-content:center;margin:auto}
.level-1-grid{grid-template-columns:repeat(2,1fr);max-width:210px}
.level-2-grid{grid-template-columns:repeat(3,1fr);max-width:330px}
.level-3-grid{grid-template-columns:repeat(4,1fr);max-width:440px}
.level-4-grid{grid-template-columns:repeat(4,1fr);max-width:470px}
.level-5-grid{grid-template-columns:repeat(5,1fr);max-width:560px}
.card{
  appearance:none;
  -webkit-appearance:none;
  width:100%;
  max-width:104px;
  aspect-ratio:2.5/3.5;
  perspective:900px;
  justify-self:center;
  cursor:pointer;
  border-radius:14px;
  background:transparent;
  border:0;
  padding:0;
  filter:drop-shadow(0 12px 12px rgba(38,48,68,.22));
}
.card-inner{
  position:relative;
  display:block;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transform-origin:center center;
  transition:transform .66s cubic-bezier(.18,1.25,.28,1);
  border-radius:14px;
}
.card.flipped .card-inner{transform:rotateY(180deg) scale(1.02)}
.card.matched .card-inner{transform:rotateY(180deg) scale(1)}
.face{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:14px;
  border:4px solid #1f2738;
  box-shadow:inset 0 0 0 4px #fff,0 7px 0 rgba(65,73,96,.32),0 13px 18px rgba(38,48,68,.32);
  transform:translateZ(0);
}
.back{
  background:
    radial-gradient(circle at 50% 50%,#fff 0 18%,transparent 19%),
    repeating-linear-gradient(45deg,rgba(255,255,255,.18) 0 7px,transparent 8px 17px),
    linear-gradient(135deg,#173d98 0%,#245ad8 50%,#173d98 100%);
  overflow:hidden;
}
.back:before{
  content:"";
  position:absolute;
  inset:9px;
  border:3px double rgba(255,255,255,.96);
  border-radius:9px;
  background:
    radial-gradient(circle at 23% 22%,#ff4d84 0 8px,transparent 9px),
    radial-gradient(circle at 77% 78%,#ff4d84 0 8px,transparent 9px),
    radial-gradient(circle at 77% 22%,#ffd33d 0 7px,transparent 8px),
    radial-gradient(circle at 23% 78%,#ffd33d 0 7px,transparent 8px),
    linear-gradient(90deg,transparent 0 46%,rgba(255,255,255,.62) 47% 53%,transparent 54%),
    linear-gradient(0deg,transparent 0 46%,rgba(255,255,255,.62) 47% 53%,transparent 54%);
}
.back:after{
  content:"♠ ♥\A♦ ♣";
  position:relative;
  white-space:pre;
  width:58%;
  aspect-ratio:1;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:#fff;
  color:#173d98;
  font-size:clamp(17px,5.4vw,27px);
  line-height:1.05;
  text-align:center;
  box-shadow:0 5px 0 rgba(12,29,77,.24);
}
.front{
  transform:rotateY(180deg);
  background:
    linear-gradient(180deg,#ffffff 0%,#fff7fb 100%);
  color:#5536bf;
  font-weight:950;
  overflow:hidden;
}
.card:not(.matched).flipped .front{
  background:
    radial-gradient(circle at 50% 48%,rgba(66,165,255,.16) 0 24%,transparent 25%),

}
.front:before,.front:after{
  content:"♪";
  position:absolute;
  font-size:18px;
  color:currentColor;
  opacity:.75;
}
.front:before{top:8px;left:9px}
.front:after{right:9px;bottom:8px;transform:rotate(180deg)}
.front .note-label{
  opacity:0;
  transform:scale(.72);
  transition:.2s ease;
  display:grid;
  place-items:center;
  gap:0;
  line-height:1;
}
.note-label .solfege{font-size:clamp(24px,8vw,38px)}
.note-label .letter{font-size:clamp(15px,4.6vw,22px);color:#263044;margin-top:3px}
.note-label .mark{font-size:clamp(22px,7vw,34px);margin-top:2px}
.matched .front .note-label{opacity:1;transform:scale(1.08)}
.matched{pointer-events:none;animation:matchedPop .62s ease both}
.matched .front{
  background:
    radial-gradient(circle at 50% 45%,#ffffff 0 31%,transparent 32%),

  border-color:#119466;
  box-shadow:inset 0 0 0 4px #fff,0 0 0 7px rgba(38,201,154,.45),0 9px 0 rgba(18,143,103,.38),0 18px 30px rgba(38,201,154,.36);
}
.matched .front:after{
  content:"せいかい!";

.first-choice .face{box-shadow:0 0 0 6px rgba(255,200,61,.58),0 9px 0 rgba(217,135,23,.25),0 18px 24px rgba(255,200,61,.25)}
.match-spark{
  position:absolute;
  z-index:4;
  left:50%;
  top:50%;
  width:9px;
  height:9px;
  border-radius:999px;
  background:#fff;
  box-shadow:0 0 0 3px rgba(255,255,255,.45);
  pointer-events:none;
}
@keyframes bounceNote{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-8px) rotate(8deg)}}
@keyframes matchedPop{0%{transform:scale(1)}35%{transform:scale(1.18) rotate(-2deg)}70%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1);opacity:1}}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.main-btn,.sub-btn{
  min-height:56px;

  font-size:clamp(15px,4.2vw,20px);
  box-shadow:0 7px 0 rgba(38,48,68,.18);

}
.main-btn{background:linear-gradient(180deg,#65e8ad,#22bd86)}

.overlay{

.overlay.show{display:grid}
.modal{

.modal h3{font-size:clamp(26px,8vw,38px);margin:0 0 8px;color:#6131bb}

.modal-actions{display:grid;grid-template-columns:1fr;gap:9px;margin-top:12px}

@keyframes modalIn{from{transform:translateY(18px) scale(.94);opacity:0}to{transform:none;opacity:1}}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:80;overflow:hidden}
.piece{position:absolute;top:-20px;border-radius:5px}
.pointer{position:absolute;z-index:5;font-size:42px;right:-10px;bottom:-8px;animation:tap 1.25s ease-in-out infinite;pointer-events:none}

  }
  .board-wrap:before{opacity:.45}

  }
  .card{

  .level-1-grid{grid-template-columns:repeat(2,1fr);max-width:190px}
  .level-1-grid .card{max-width:92px}
  .level-2-grid{grid-template-columns:repeat(3,1fr);max-width:260px}
  .level-2-grid .card{max-width:80px}
  .level-3-grid{grid-template-columns:repeat(3,1fr);max-width:260px}
  .level-3-grid .card{max-width:80px}
  .level-4-grid{grid-template-columns:repeat(4,1fr);max-width:306px}
  .level-4-grid .card{max-width:70px}
  .level-5-grid{grid-template-columns:repeat(4,1fr);max-width:293px}
  .level-5-grid .card{max-width:clamp(58px, 17.5vw, 68px)}
  .status{
    order:4;

  }
  .stat{
    min-height:42px;

  }
  .stat small{font-size:10px}

    order:5;

  }

  .controls{order:3;grid-template-columns:1fr 1fr;gap:7px}
  .main-btn,.sub-btn{

@media (prefers-reduced-motion:reduce){
  *,*:before,*:after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}

<body>
<main class="app">
  <header class="top">
    <h1>ドレミ<br>神経衰弱</h1>
    <div class="badge" aria-hidden="true">♫</div>
  </header>

  <section class="board-wrap">
    <div class="game-board" id="gameBoard"></div>
  </section>

  <div class="message" id="message">カードを タッチしてね</div>

  <section class="status" aria-label="ゲーム情報">
    <div class="stat"><small>レベル</small><b id="levelDisplay">1</b></div>
    <div class="stat"><small>のこり</small><b><span id="remainingDisplay">1</span>ペア</b></div>
    <div class="stat"><small>タイム</small><b><span id="timerDisplay">0.00</span></b></div>
  </section>

  <div class="stars" id="starDisplay" aria-label="進み具合"></div>

  <section class="controls">
    <button class="main-btn" id="resetButton" type="button">さいしょから</button>
    <button class="sub-btn" id="replayButton" type="button">おと もう1回</button>
  </section>
</main>

<div class="overlay" id="clearOverlay" role="dialog" aria-modal="true">
  <div class="modal">
    <h3 id="clearTitle">レベルクリア</h3>
    <p id="clearText"></p>
    <div class="modal-actions" id="nextLevelActions">
      <button class="main-btn" id="nextLevelButton" type="button">つぎへ</button>
    </div>
    <div class="modal-actions final-choice-actions" id="finalChoiceActions" hidden>
      <button class="main-btn" id="playAgainButton" type="button">もういちど</button>
      <button class="sub-btn" id="quitButton" type="button">やめる</button>
    </div>
  </div>
</div>
<div class="confetti" id="confetti"></div>

<script>
let audioContext;
let masterGain;
let activeOscillators = new Set();

const frequencies = {
  "ド":261.625565, "ド#":277.182631, "レ":293.664768, "レ#":311.126984,
  "ミ":329.627557, "ファ":349.228231, "ファ#":369.994423, "ソ":391.995436,
  "ソ#":415.304698, "ラ":440.000000, "ラ#":466.163762, "シ":493.883301, "高ド":523.251131
};
const allNotes = ["ド","ド#","レ","レ#","ミ","ファ","ファ#","ソ","ソ#","ラ","ラ#","シ","高ド"];
const noteColors = {
  "ド":"#ff6b6b","ド#":"#ff8f43","レ":"#feca57","レ#":"#b8e056","ミ":"#1dd1a1","ファ":"#48dbfb",
  "ファ#":"#54a0ff","ソ":"#5f7cfa","ソ#":"#7d5fff","ラ":"#a55eea","ラ#":"#f368e0","シ":"#ff6b9f","高ド":"#ff4757"
};
const noteLetters = {
  "ド":"C","ド#":"C#","レ":"D","レ#":"D#","ミ":"E","ファ":"F","ファ#":"F#",
  "ソ":"G","ソ#":"G#","ラ":"A","ラ#":"A#","シ":"B","高ド":"C"
};
const levels = [
  { id:1, name:"はじめのド", notes:["ド"], gridClass:"level-1-grid", reward:"ドの音、みつけたね" },
  { id:2, name:"ドレミ", notes:["ド","レ","ミ"], gridClass:"level-2-grid", reward:"ド・レ・ミの耳になってきた" },
  { id:3, name:"5つのおと", notes:["ド","レ","ミ","ファ","ソ"], gridClass:"level-3-grid", reward:"音の高さをおぼえられたね" },
  { id:4, name:"1オクターブ", notes:["ド","レ","ミ","ファ","ソ","ラ","シ","高ド"], gridClass:"level-4-grid", reward:"白鍵の音がつながってきた" },
  { id:5, name:"くろけんも", notes:allNotes, gridClass:"level-5-grid", reward:"ぜんぶの音をききわけたよ" }
];

const gameBoard = document.getElementById("gameBoard");
const levelDisplay = document.getElementById("levelDisplay");
const remainingDisplay = document.getElementById("remainingDisplay");
const timerDisplay = document.getElementById("timerDisplay");
const message = document.getElementById("message");
const starDisplay = document.getElementById("starDisplay");
const resetButton = document.getElementById("resetButton");
const replayButton = document.getElementById("replayButton");
const clearOverlay = document.getElementById("clearOverlay");
const clearTitle = document.getElementById("clearTitle");
const clearText = document.getElementById("clearText");
const nextLevelActions = document.getElementById("nextLevelActions");
const nextLevelButton = document.getElementById("nextLevelButton");
const finalChoiceActions = document.getElementById("finalChoiceActions");
const playAgainButton = document.getElementById("playAgainButton");
const quitButton = document.getElementById("quitButton");
const confetti = document.getElementById("confetti");

let cards = [];
let firstCard = null;
let secondCard = null;
let hasFlippedCard = false;
let lockBoard = false;
let matchedPairs = 0;
let totalPairs = 0;
let currentLevelIndex = 0;
let timerStarted = false;
let startTime = 0;
let timerIntervalId = 0;
let lastHeardNote = null;
let pendingClearTime = 0;
let streak = 0;

function createAudioGraph(){
  const Ctx = window.AudioContext || window.webkitAudioContext;
  audioContext = new Ctx();
  masterGain = audioContext.createGain();
  masterGain.gain.value = 0.92;
  masterGain.connect(audioContext.destination);
}
createAudioGraph();

async function resumeAudio(){
  if (!audioContext || audioContext.state === "closed") createAudioGraph();
  if (audioContext.state === "suspended" || audioContext.state === "interrupted") {
    try { await audioContext.resume(); } catch(e) {}
  }
}
document.addEventListener("pointerdown", resumeAudio, {passive:true});
document.addEventListener("visibilitychange", () => { if (!document.hidden) resumeAudio(); });
window.addEventListener("pageshow", resumeAudio);

async function playNote(note, duration = .46, type = "triangle"){
  await resumeAudio();
  const frequency = frequencies[note];
  if (!frequency) return;
  const t = audioContext.currentTime + .005;
  const end = t + duration;
  const osc = audioContext.createOscillator();
  const overtone = audioContext.createOscillator();
  const body = audioContext.createGain();
  const overtoneGain = audioContext.createGain();
  const attackClick = audioContext.createGain();
  const bright = audioContext.createBiquadFilter();
  osc.type = type;
  overtone.type = "sine";
  osc.frequency.setValueAtTime(frequency, t);
  overtone.frequency.setValueAtTime(frequency * 2, t);
  bright.type = "highshelf";
  bright.frequency.setValueAtTime(1200, t);
  bright.gain.setValueAtTime(5, t);
  body.gain.setValueAtTime(0.0001, t);
  body.gain.exponentialRampToValueAtTime(.52, t + .018);
  body.gain.exponentialRampToValueAtTime(.36, t + .09);
  body.gain.exponentialRampToValueAtTime(.0001, end);
  overtoneGain.gain.setValueAtTime(.0001, t);
  overtoneGain.gain.exponentialRampToValueAtTime(.08, t + .012);
  overtoneGain.gain.exponentialRampToValueAtTime(.0001, t + .18);
  attackClick.gain.setValueAtTime(.16, t);
  attackClick.gain.exponentialRampToValueAtTime(.0001, t + .035);
  osc.connect(bright);
  bright.connect(body);
  overtone.connect(overtoneGain);
  overtoneGain.connect(body);
  body.connect(masterGain);
  osc.connect(attackClick);
  attackClick.connect(masterGain);
  osc.start(t);
  overtone.start(t);
  osc.stop(end + .02);
  overtone.stop(end + .02);
  activeOscillators.add(osc);
  activeOscillators.add(overtone);
  osc.onended = () => {
    activeOscillators.delete(osc);
    try { osc.disconnect(); bright.disconnect(); body.disconnect(); attackClick.disconnect(); } catch(e) {}
  };
  overtone.onended = () => {
    activeOscillators.delete(overtone);
    try { overtone.disconnect(); overtoneGain.disconnect(); } catch(e) {}
  };
}

function stopAllAudio(ms = 120){
  if (!audioContext || audioContext.state === "closed") return;
  const t = audioContext.currentTime;
  masterGain.gain.cancelScheduledValues(t);
  masterGain.gain.setValueAtTime(masterGain.gain.value, t);
  masterGain.gain.linearRampToValueAtTime(.0001, t + ms / 1000);
  setTimeout(() => {
    activeOscillators.forEach(o => { try { o.stop(); } catch(e) {} });
    activeOscillators.clear();
    const now = audioContext.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setValueAtTime(.92, now);
  }, ms + 30);
}

async function playLevelFanfare(finalLevel){
  await resumeAudio();
  const seq = finalLevel ? ["ド","ミ","ソ","高ド","ソ","高ド"] : ["ド","ミ","ソ","高ド"];
  for (const note of seq) {
    playNote(note, finalLevel ? .22 : .18, finalLevel ? "triangle" : "sine");
    await wait(finalLevel ? 150 : 140);
  }
}

function wait(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }
function shuffle(items){ return items.map(v => [Math.random(), v]).sort((a,b) => a[0] - b[0]).map(v => v[1]); }

function startTimer(){
  startTime = performance.now();
  clearInterval(timerIntervalId);
  timerIntervalId = setInterval(() => {
    timerDisplay.textContent = ((performance.now() - startTime) / 1000).toFixed(2);
  }, 80);
}
function stopTimer(){
  clearInterval(timerIntervalId);
  const seconds = (performance.now() - startTime) / 1000;
  timerDisplay.textContent = seconds.toFixed(2);
  return seconds;
}

function renderStars(){
  starDisplay.innerHTML = levels.map((_, i) => `<span class="star ${i <= currentLevelIndex ? "on" : ""}">⭐</span>`).join("");
}

function initializeGame(){
  stopAllAudio(40);
  const level = levels[currentLevelIndex];
  matchedPairs = 0;
  totalPairs = level.notes.length;
  firstCard = null;
  secondCard = null;
  hasFlippedCard = false;
  lockBoard = false;
  timerStarted = false;
  lastHeardNote = null;
  streak = 0;
  clearInterval(timerIntervalId);
  timerDisplay.textContent = "0.00";
  levelDisplay.textContent = level.id;
  remainingDisplay.textContent = totalPairs;
  message.textContent = level.id === 1 ? "カードを タッチしてね" : "カードを2まい タッチしてね";
  gameBoard.className = "game-board " + level.gridClass;
  gameBoard.innerHTML = "";
  confetti.innerHTML = "";
  renderStars();

  const gameNotes = shuffle([...level.notes, ...level.notes]);
  const fragment = document.createDocumentFragment();
  cards = gameNotes.map((note, index) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "card";
    card.dataset.note = note;
    card.dataset.index = index;
    card.innerHTML = `<span class="card-inner"><span class="face front" style="color:${noteColors[note]}"><span class="note-label"><span class="solfege">${note}</span><span class="letter">${noteLetters[note]}</span><span class="mark">♪</span></span></span><span class="face back"></span></span>`;
    card.addEventListener("click", flipCard);
    fragment.appendChild(card);
    return card;
  });
  gameBoard.appendChild(fragment);

  if (level.id === 1) setTimeout(showTutorial, 480);
}

function showTutorial(){
  if (currentLevelIndex !== 0 || !cards[0] || firstCard) return;
  cards.slice(0, 2).forEach((card, i) => {
    card.classList.add("tutorial-target");
    const pointer = document.createElement("span");
    pointer.className = "pointer";
    pointer.textContent = "👆";
    pointer.style.animationDelay = i ? ".45s" : "0s";
    card.appendChild(pointer);
  });
}
function removeTutorial(){
  document.querySelectorAll(".pointer").forEach(el => el.remove());
  document.querySelectorAll(".tutorial-target").forEach(el => el.classList.remove("tutorial-target"));
}

async function flipCard(){
  removeTutorial();
  if (lockBoard || this === firstCard || this.classList.contains("matched")) return;
  await resumeAudio();
  if (!timerStarted) {
    startTimer();
    timerStarted = true;
  }
  const note = this.dataset.note;
  lastHeardNote = note;
  this.classList.add("flipped");
  playNote(note);

  if (!hasFlippedCard) {
    hasFlippedCard = true;
    firstCard = this;
    firstCard.classList.add("first-choice");
    message.textContent = "いまの音と おなじ音を さがそう";
    return;
  }

  secondCard = this;
  lockBoard = true;
  checkForMatch();
}

function checkForMatch(){
  const same = firstCard.dataset.note === secondCard.dataset.note;
  if (same) {
    streak++;
    message.textContent = streak >= 2 ? "れんぞくせいかい きもちいい" : "せいかい いい耳だね";
    setTimeout(disableCards, 280);
  } else {
    streak = 0;
    message.textContent = "ちがう音だったね もういちど";
    setTimeout(unflipCards, 920);
  }
}

function disableCards(){
  firstCard.removeEventListener("click", flipCard);
  secondCard.removeEventListener("click", flipCard);
  firstCard.classList.remove("first-choice");
  firstCard.classList.add("matched");
  secondCard.classList.add("matched");
  burstOnCard(firstCard);
  burstOnCard(secondCard);
  playSuccessSound(firstCard.dataset.note);
  matchedPairs++;
  remainingDisplay.textContent = totalPairs - matchedPairs;
  firstCard = null;
  secondCard = null;
  hasFlippedCard = false;
  lockBoard = false;
  if (matchedPairs === totalPairs) clearLevel();
}

function burstOnCard(card){
  const colors = ["#22bd86","#ffc83d","#ff6b9f","#42a5ff"];
  for (let i = 0; i < 10; i++) {
    const spark = document.createElement("span");
    spark.className = "match-spark";
    spark.style.background = colors[i % colors.length];
    const angle = (Math.PI * 2 * i) / 10;
    const distance = 34 + Math.random() * 24;
    card.appendChild(spark);
    spark.animate([
      { transform:"translate(-50%,-50%) scale(1)", opacity:1 },
      { transform:`translate(calc(-50% + ${Math.cos(angle) * distance}px), calc(-50% + ${Math.sin(angle) * distance}px)) scale(.15)`, opacity:0 }
    ], { duration:650, easing:"cubic-bezier(.12,.88,.28,1)", fill:"forwards" });
    setTimeout(() => spark.remove(), 720);
  }
}

async function playSuccessSound(note){
  await wait(35);
  playNote(note, .18, "triangle");
  await wait(95);
  playNote("高ド", .2, "triangle");
}

function unflipCards(){
  firstCard.classList.remove("flipped", "first-choice");
  secondCard.classList.remove("flipped");
  firstCard = null;
  secondCard = null;
  hasFlippedCard = false;
  lockBoard = false;
  message.textContent = "カードをめくってね";
}

async function clearLevel(){
  lockBoard = true;
  pendingClearTime = stopTimer();
  const level = levels[currentLevelIndex];
  const finalLevel = currentLevelIndex === levels.length - 1;
  message.textContent = "Lv." + level.id + " クリア";
  launchConfetti(finalLevel);
  await playLevelFanfare(finalLevel);
  clearTitle.textContent = finalLevel ? "ぜんぶクリア" : "レベルアップ";
  clearText.textContent = finalLevel
    ? level.reward + "。もういちど あそぶ?"
    : level.reward + "。タイム " + pendingClearTime.toFixed(2) + "秒";
  nextLevelActions.hidden = finalLevel;
  finalChoiceActions.hidden = !finalLevel;
  clearOverlay.classList.add("show");
  (finalLevel ? playAgainButton : nextLevelButton).focus();
}

function completeClear(){
  clearOverlay.classList.remove("show");
  currentLevelIndex++;
  if (currentLevelIndex >= levels.length) {
    currentLevelIndex = 0;
    message.textContent = "すごい もういちど あそぼう";
  }
  initializeGame();
}

function playAgain(){
  clearOverlay.classList.remove("show");
  currentLevelIndex = 0;
  initializeGame();
}

function quitGame(){
  clearOverlay.classList.remove("show");
  lockBoard = true;
  message.textContent = "また あそんでね";
}

function launchConfetti(big){
  const colors = ["#ff6b9f","#ffc83d","#26c99a","#42a5ff","#8e70ff","#ff5f57"];
  const count = big ? 150 : 80;
  confetti.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const piece = document.createElement("span");
    piece.className = "piece";
    const size = Math.random() * 10 + 7;
    piece.style.width = size + "px";
    piece.style.height = Math.random() > .5 ? size + "px" : size * .55 + "px";
    piece.style.left = Math.random() * 100 + "vw";
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.animate([
      { transform:"translate3d(0,0,0) rotate(0deg)", opacity:1 },
      { transform:`translate3d(${Math.random()*130-65}px,105vh,0) rotate(${Math.random()*820}deg)`, opacity:0 }
    ], { duration:Math.random() * 1700 + 1800, easing:"cubic-bezier(.18,.88,.32,1)", fill:"forwards" });
    confetti.appendChild(piece);
  }
}

resetButton.addEventListener("click", () => {
  currentLevelIndex = 0;
  clearOverlay.classList.remove("show");
  initializeGame();
});
replayButton.addEventListener("click", () => {
  if (firstCard) {
    lastHeardNote = firstCard.dataset.note;
    playNote(lastHeardNote);
    message.textContent = "この音と おなじ音を さがそう";
  } else if (lastHeardNote) {
    playNote(lastHeardNote);
  } else {
    message.textContent = "カードを1まい タッチしてね";
  }
});
nextLevelButton.addEventListener("click", completeClear);
playAgainButton.addEventListener("click", playAgain);
quitButton.addEventListener("click", quitGame);

initializeGame();
</script>
</body>
